<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/main.js" defer></script>
</head>
<body> 
    <div class="container">
        <div class="header-container">
            <h1>TIC TAC TOE!</h1>
        </div>
        <div class="game-container">
            <div class="player-data player-one">
                <div>PLAYER 1</div>
                <div>SCORE</div>
                <div class="player-one-score">76</div>
            </div>
            <div class="gameboard-container">
                <div class="results-container">RESULT</div>
                <div class="gameboard">
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                </div>
                <div class="reset-container">
                    <div class="btn">Reset game</div>
                </div>
            </div>
            <div class="player-data player-two">
                <div>PLAYER 2</div>
                <div>SCORE</div>
                <div class="player-two-score">788</div>
            </div>
        </div>
    </div>
</body>
</html>
