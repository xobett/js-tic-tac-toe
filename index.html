<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/main.js" defer></script>
</head>
<body> 
    <div class="container">
        <div class="header-container">
            <h1>TIC TAC TOE!</h1>
        </div>
        <div class="players-input-container">
            <form id="form">
                <div class="message">Please enter each player's name</div>
                <div class="fields">
                    <div class="field-container">
                        <input type="text" min="3" id="player-one-name" name="player-one-name" placeholder="" required>
                        <label for="player-one-name">Player 1 Name</label>
                    </div>
                    <div class="field-container">
                        <input type="text" min="3" id="player-two-name" name="player-two-name" placeholder="" required>
                        <label for="player-two-name">Player 2 Name</label>
                    </div>
                </div>
                <button class="btn" type="submit">Start</button>
            </form>
        </div>
        <div class="game-container">
            <div class="player-data">
                <div class="player-one-name">PLAYER 1</div>
                <div>SCORE</div>
                <div class="player-one-score"></div>
            </div>
            <div class="gameboard-container">
                <div class="message-container">RESULT</div>
                <div class="gameboard">
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                    <div class="position" data-symbol=""></div>
                </div>
                <div class="reset-container">
                    <div class="btn reset-btn">Reset game</div>
                </div>
            </div>
            <div class="player-data">
                <div class="player-two-name">PLAYER 2</div>
                <div>SCORE</div>
                <div class="player-two-score"></div>
            </div>
        </div>
    </div>
</body>
</html>
